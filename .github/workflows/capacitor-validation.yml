name: Capacitor Validation

on:
  workflow_dispatch:
  pull_request:

jobs:
  capacitor-validation:
    name: Validate Capacitor foundation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install npm dependencies
        run: npm install

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 8.14.4

      - name: Restore Android Gradle wrapper jar
        run: |
          if [ -f android/gradle/wrapper/gradle-wrapper.jar ]; then
            echo "Gradle wrapper jar already present."
            exit 0
          fi

          tmpdir="$(mktemp -d)"
          cleanup() {
            rm -rf "$tmpdir"
          }
          trap cleanup EXIT

          printf '' > "$tmpdir/settings.gradle"
          (cd "$tmpdir" && gradle wrapper --gradle-version 8.14.4 --distribution-type bin --no-validate-url)
          mkdir -p android/gradle/wrapper
          cp "$tmpdir/gradle/wrapper/gradle-wrapper.jar" android/gradle/wrapper/gradle-wrapper.jar

      - name: Populate Capacitor web output directory
        run: |
          rm -rf www android/app/src/main/assets/public
          mkdir -p www android/app/src/main/assets/public
          cp index.html manifest.json service-worker.js www/
          cp -R css js assets data www/
          cp -R www/. android/app/src/main/assets/public/

      - name: Run Capacitor doctor
        run: |
          set +e
          doctor_output="$(npx cap doctor 2>&1)"
          doctor_status=$?
          set -e

          printf '%s\n' "$doctor_output"

          unexpected_errors="$(printf '%s\n' "$doctor_output" | sed -n '/\[error\]/p' | grep -v 'Xcode is not installed' || true)"

          if [ -n "$unexpected_errors" ]; then
            printf '%s\n' "Unexpected Capacitor doctor error(s):"
            printf '%s\n' "$unexpected_errors"
            exit 1
          fi

          if [ "$doctor_status" -ne 0 ]; then
            if printf '%s\n' "$doctor_output" | grep -q 'Xcode is not installed'; then
              printf '%s\n' "Ignoring expected Linux CI Xcode warning; iOS validation belongs in a macOS workflow."
              exit 0
            fi

            exit "$doctor_status"
          fi

      - name: Sync Android Capacitor project
        run: npx cap sync android

      - name: Check app JavaScript syntax
        run: node --check js/app.js

      - name: Check service worker syntax when present
        run: |
          if [ -f service-worker.js ]; then
            node --check service-worker.js
          else
            echo "service-worker.js not found; skipping syntax check."
          fi

      - name: Validate capacitor.config.json
        run: |
          node <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const configFiles = [
            'capacitor.config.json',
            'android/capacitor.config.json',
            'ios/App/App/capacitor.config.json',
          ];
          const invalidWebDirs = new Set(['', '.', '..', '../', './']);
          const configs = configFiles.map((file) => ({
            file,
            config: JSON.parse(fs.readFileSync(file, 'utf8')),
          }));

          for (const { file, config } of configs) {
            const requiredFields = ['appId', 'appName', 'webDir'];
            const missingFields = requiredFields.filter((field) => !config[field]);

            if (missingFields.length > 0) {
              throw new Error(`${file} is missing required field(s): ${missingFields.join(', ')}`);
            }

            if (invalidWebDirs.has(config.webDir)) {
              throw new Error(`${file} has invalid Capacitor webDir value: ${JSON.stringify(config.webDir)}`);
            }

            if (config.webDir !== 'www') {
              throw new Error(`${file} must use Gridly's dedicated Capacitor webDir: www`);
            }

            if (!fs.existsSync(path.join(config.webDir, 'index.html'))) {
              throw new Error(`${config.webDir}/index.html must exist before Capacitor validation.`);
            }
          }

          const rootConfig = JSON.stringify(configs[0].config);
          for (const { file, config } of configs.slice(1)) {
            if (JSON.stringify(config) !== rootConfig) {
              throw new Error(`${file} does not match capacitor.config.json`);
            }
          }

          console.log('Capacitor root config and Android/iOS snapshots are valid and aligned.');
          NODE

      - name: Validate manifest.json
        run: |
          node <<'NODE'
          const fs = require('fs');
          const manifest = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
          const requiredFields = ['name', 'short_name', 'display', 'start_url', 'icons'];
          const missingFields = requiredFields.filter((field) => !manifest[field]);

          if (missingFields.length > 0) {
            throw new Error(`manifest.json is missing required field(s): ${missingFields.join(', ')}`);
          }

          if (!Array.isArray(manifest.icons) || manifest.icons.length === 0) {
            throw new Error('manifest.json must include at least one icon.');
          }

          console.log('manifest.json is valid JSON and includes required PWA manifest fields.');
          NODE

      - name: Note future iOS validation
        run: echo "iOS Capacitor sync is deferred to a future macOS workflow because iOS validation typically requires macOS, Xcode, and CocoaPods."
