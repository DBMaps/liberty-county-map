<svg xmlns="http://www.w3.org/2000/svg" width="32" height="44" viewBox="0 0 32 44" role="img" aria-labelledby="title desc">
  <title id="title">Gridly flooding marker</title>
  <desc id="desc">Dark circular Gridly incident marker with stacked white water waves.</desc>
  <defs>
  <filter id="gridlyMarkerShadow" x="-30%" y="-20%" width="160%" height="150%" color-interpolation-filters="sRGB">
    <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#020617" flood-opacity="0.38"/>
  </filter>
  <linearGradient id="gridlyMarkerBase" x1="8" y1="3" x2="25" y2="33" gradientUnits="userSpaceOnUse">
    <stop offset="0" stop-color="#1F2937"/>
    <stop offset="1" stop-color="#070B12"/>
  </linearGradient>
</defs>
  <g filter="url(#gridlyMarkerShadow)">
    <path d="M16 43.2L10.8 28.4H21.2L16 43.2Z" fill="url(#gridlyMarkerBase)"/>
    <circle cx="16" cy="16" r="15" fill="url(#gridlyMarkerBase)"/>
    <circle cx="16" cy="16" r="14" fill="none" stroke="var(--gridly-marker-status, #38BDF8)" stroke-width="2" opacity="0.96"/>
    <circle cx="16" cy="16" r="10.8" fill="#111827" opacity="0.58"/>
  </g>
  <g fill="none" stroke="#FFFFFF" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.85">
    <path d="M8.2 12.2C10.1 10.5 12 10.5 13.9 12.2C15.5 13.6 17.1 13.6 18.7 12.2C20.3 10.8 21.9 10.8 23.8 12.2"/>
    <path d="M7.8 17C9.7 15.3 11.9 15.3 13.8 17C15.5 18.5 17.3 18.5 19 17C20.5 15.6 22.1 15.6 24.2 17"/>
    <path d="M8.2 21.8C10.2 20.1 12.1 20.1 14 21.8C15.6 23.2 17.4 23.2 19 21.8C20.6 20.4 22.2 20.4 23.8 21.8"/>
  </g>
</svg>
