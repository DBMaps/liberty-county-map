<svg xmlns="http://www.w3.org/2000/svg" width="32" height="44" viewBox="0 0 32 44" role="img" aria-labelledby="title desc">
  <title id="title">Gridly train marker</title>
  <desc id="desc">Dark circular Gridly incident marker with a white train and rail glyph.</desc>
  <defs>
  <filter id="gridlyMarkerShadow" x="-30%" y="-20%" width="160%" height="150%" color-interpolation-filters="sRGB">
    <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#020617" flood-opacity="0.38"/>
  </filter>
  <linearGradient id="gridlyMarkerBase" x1="8" y1="3" x2="25" y2="33" gradientUnits="userSpaceOnUse">
    <stop offset="0" stop-color="#1F2937"/>
    <stop offset="1" stop-color="#070B12"/>
  </linearGradient>
</defs>
  <g filter="url(#gridlyMarkerShadow)">
